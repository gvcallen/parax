name: Parax Tests

# Run this workflow on all pushes and pull requests to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # This will run your tests across three different Python versions simultaneously!
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Caches dependencies so future runs are much faster

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the core JAX ecosystem and testing tools
        pip install jax jaxlib equinox numpyro pytest
        
        # Install your parax library so the tests can import it
        # (Assuming your setup.py or pyproject.toml is in the root)
        pip install -e .

    - name: Run pytest
      run: |
        # Run all tests in the tests/ directory
        pytest tests/